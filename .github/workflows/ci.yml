name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (echo "unformatted files:"; gofmt -l .; exit 1)

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race)
        run: go test -race ./...
